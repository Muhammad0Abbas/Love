<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday ❤️</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
        }
        h1 {
            margin-top: 50px;
            font-size: 50px;
        }
        p {
            font-size: 20px;
        }
        .heart {
            font-size: 40px;
            animation: beat 1s infinite;
        }
        @keyframes beat {
            0% {transform: scale(1);}
            50% {transform: scale(1.2);}
            100% {transform: scale(1);}
        }
    </style>
</head>
<body>

    <h1>🎉 Happy Birthday My Love 🎉</h1>

    <p>
        Meri pyari jaan ❤️<br><br>
        Tum meri life ki sab se khoobsurat cheez ho 💖<br>
        Allah tumhein hamesha khush rakhe 😊<br><br>
        I love you so much 💕
    </p>

    <div class="heart">❤️</div>

</body>
</html>
