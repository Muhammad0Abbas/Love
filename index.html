<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
    background: linear-gradient(to right, #ff9a9e, #fad0c4, #fad0c4, #ffdde1);
    color: white;
  }
  .slide {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 1s ease-in-out;
  }
  h1 {
    font-size: 60px;
    margin: 20px 0;
    animation: glow 2s infinite alternate;
  }
  p {
    font-size: 24px;
    max-width: 80%;
    text-align: center;
    line-height: 1.5;
  }
  .heart {
    font-size: 50px;
    animation: beat 1s infinite;
  }
  @keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  @keyframes glow {
    0% { text-shadow: 0 0 5px #fff; }
    50% { text-shadow: 0 0 20px #ff0, 0 0 30px #f0f; }
    100% { text-shadow: 0 0 5px #fff; }
  }
  .q-word {
    font-size: 50px;
    color: #ffeb3b;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0        Allah tumhein hamesha khush rakhe 😊<br><br>
        I love you so much 💕
    </p>

    <div class="heart">❤️</div>

</body>
</html>
